<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arraiá Raiz 2026</title>
  <style>
    body {
      margin: 0;
      font-family: 'Arial', sans-serif;
      background: linear-gradient(#4a2c0b, #8b4513);
      color: white;
      text-align: center;
      overflow-x: hidden;
    }

    .header {
      padding: 20px 10px;
      position: relative;
    }

    .title-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .title-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 15px;
    }

    .title {
      font-size: 3.5rem;
      font-weight: bold;
      text-shadow: 3px 3px 6px rgba(0,0,0,0.8);
      color: #ffd700;
      line-height: 1;
    }

    .decoration {
      width: 60px;
      height: auto;
      filter: drop-shadow(2px 2px 4px rgba(0,0,0,0.6));
    }

    /* Responsivo - mobile */
    @media (max-width: 768px) {
      .title {
        font-size: 2.8rem;
      }
      .decoration {
        width: 45px;
      }
      .title-row {
        gap: 10px;
      }
    }

    /* Outros estilos do site (botões, etc.) */
    .buttons {
      display: flex;
      justify-content: center;
      gap: 15px;
      flex-wrap: wrap;
      margin: 20px;
    }
    button {
      padding: 12px 24px;
      border: none;
      border-radius: 30px;
      font-size: 1.1rem;
      cursor: pointer;
    }
    /* Adicione o resto do seu CSS aqui */
  </style>
</head>
<body>
  <div class="header">
    <!-- Enfeites de fundo (bandeirinhas) -->
    <div style="position: absolute; top: 10px; left: 10px; opacity: 0.8;">
      <!-- Coloque aqui imagens ou SVG de bandeirinhas -->
    </div>

    <div class="title-container">
      <!-- Primeira linha: ARRAIÁ + enfeites -->
      <div class="title-row">
        <img src="https://via.placeholder.com/60x60?text=🌽" alt="enfeite" class="decoration"> <!-- Substitua pela imagem real -->
        <span class="title">ARRAIÁ</span>
        <img src="https://via.placeholder.com/60x60?text=🌽" alt="enfeite" class="decoration">
      </div>

      <!-- Segunda linha: RAIZ + enfeites -->
      <div class="title-row">
        <img src="https://via.placeholder.com/60x60?text=🎉" alt="enfeite" class="decoration">
        <span class="title">RAIZ</span>
        <img src="https://via.placeholder.com/60x60?text=🎉" alt="enfeite" class="decoration">
      </div>
    </div>

    <p style="font-size: 1.4rem; margin: 10px 0; color: #ffeb3b;">20 de Junho de 2026</p>
  </div>

  <!-- Resto da página (botões, conteúdo, etc.) -->
  <div class="buttons">
    <button style="background: #ffd700; color: #4a2c0b;">Sobre</button>
    <button style="background: #c41e3a;">Informações</button>
    <button style="background: #4caf50;">Confirmar</button>
  </div>

  <!-- Seção de boas-vindas -->
  <div style="background: white; color: #4a2c0b; margin: 20px; padding: 20px; border-radius: 15px;">
    <h1>BEM-VINDO AO ARRAIÁ!</h1>
    <p>Tradição com Alegria...</p>
  </div>
</body>
</html>
